<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frost — Streak Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template.css" />
  <style>
    :root { --accent: #38bdf8; }
  </style>
</head>
<body>

  <nav class="t-nav">
    <a href="../index.html" class="t-back">
      <span class="t-back-arrow">←</span> All Templates
    </a>
    <span class="t-name">Frost</span>
    <div class="t-actions">
      <button class="t-btn t-btn-ghost" id="btn-copy-svg">Copy SVG</button>
      <button class="t-btn t-btn-solid" id="btn-copy-md">Copy Markdown</button>
    </div>
  </nav>

  <div class="t-stage">

    <div class="t-card-wrap" id="card-wrap">
      <svg id="streak-card"
        viewBox="0 0 495 195"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-label="GitHub Streak Stats for SAPTARSHI-coder"
      >
        <title>GitHub Streak Stats — SAPTARSHI-coder</title>

        <!-- Soft glow behind border -->
        <defs>
          <filter id="frost-glow" x="-8%" y="-8%" width="116%" height="116%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Background -->
        <rect width="495" height="195" rx="14" ry="14"
              fill="#0f1923" stroke="#38bdf8" stroke-width="1.5"
              filter="url(#frost-glow)" opacity="0.3"/>
        <rect width="495" height="195" rx="14" ry="14"
              fill="#0f1923" stroke="#38bdf8" stroke-width="1.5"/>

        <!-- Title -->
        <text x="247" y="22" text-anchor="middle"
              font-family="Inter, sans-serif" font-size="12.5" font-weight="500"
              fill="#94a3b8" letter-spacing="0.5">
          ❄️ GitHub Streak Stats — SAPTARSHI-coder
        </text>

        <!-- Dividers -->
        <line x1="20"  y1="32" x2="475" y2="32" stroke="#1e2d3d" stroke-width="1"/>
        <line x1="165" y1="38" x2="165" y2="181" stroke="#1e2d3d" stroke-width="1"/>
        <line x1="330" y1="38" x2="330" y2="181" stroke="#1e2d3d" stroke-width="1"/>

        <!-- Column 1 -->
        <g>
          <text x="82" y="72" text-anchor="middle" font-size="24" fill="#34d399">📊</text>
          <text x="82" y="90" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#64748b" letter-spacing="1">
            TOTAL CONTRIBUTIONS
          </text>
          <text x="82" y="126" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#34d399">
            1,247
          </text>
          <text x="82" y="145" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#64748b">
            Last 365 days
          </text>
        </g>

        <!-- Column 2 -->
        <g>
          <text x="248" y="72" text-anchor="middle" font-size="24" fill="#38bdf8">❄️</text>
          <text x="248" y="90" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#64748b" letter-spacing="1">
            CURRENT STREAK
          </text>
          <text x="248" y="126" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#38bdf8">
            42 days
          </text>
          <text x="248" y="145" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#64748b">
            May 1 – May 6, 2025
          </text>
        </g>

        <!-- Column 3 -->
        <g>
          <text x="413" y="72" text-anchor="middle" font-size="24" fill="#a78bfa">⚡</text>
          <text x="413" y="90" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#64748b" letter-spacing="1">
            LONGEST STREAK
          </text>
          <text x="413" y="126" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#a78bfa">
            87 days
          </text>
          <text x="413" y="145" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#64748b">
            Feb 3 – Apr 30, 2025
          </text>
        </g>

        <!-- Footer -->
        <text x="247" y="183" text-anchor="middle"
              font-family="Inter, sans-serif" font-size="9" fill="#1e3a50">
          Updated automatically by GitHub Actions
        </text>
      </svg>
    </div>

    <div class="t-embed">
      <div class="t-embed-header">
        <span class="t-embed-label">README Embed</span>
        <button class="t-copy-inline" id="btn-copy-embed">copy</button>
      </div>
      <pre class="t-embed-code" id="embed-code">![GitHub Streak](https://raw.githubusercontent.com/SAPTARSHI-coder/github-streak-tracker/main/streak.svg)</pre>
    </div>
  </div>

  <footer class="t-footer">Streak.Studio · Frost Template · Personal use only</footer>
  <div class="t-toast" id="toast">✓ Copied!</div>

  <script>
    const toast = document.getElementById('toast');
    function showToast(msg = '✓ Copied!') {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    document.getElementById('btn-copy-svg').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('streak-card').outerHTML)
        .then(() => showToast('✓ SVG copied!'));
    });
    document.getElementById('btn-copy-md').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('embed-code').textContent.trim())
        .then(() => showToast('✓ Markdown copied!'));
    });
    document.getElementById('btn-copy-embed').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('embed-code').textContent.trim())
        .then(() => showToast('✓ Copied!'));
    });
  </script>

</body>
</html>
