<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ember — Streak Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template.css" />
  <style>
    :root { --accent: #f97316; }
  </style>
</head>
<body>

  <!-- ── Nav ─────────────────────────────────────────────────────────────── -->
  <nav class="t-nav">
    <a href="../index.html" class="t-back">
      <span class="t-back-arrow">←</span> All Templates
    </a>
    <span class="t-name">Ember</span>
    <div class="t-actions">
      <button class="t-btn t-btn-ghost" id="btn-copy-svg">Copy SVG</button>
      <button class="t-btn t-btn-solid" id="btn-copy-md">Copy Markdown</button>
    </div>
  </nav>

  <!-- ── Stage ────────────────────────────────────────────────────────────── -->
  <div class="t-stage">

    <!-- ════════════════════════════════════════════════════════════════════
         CARD SVG — edit anything inside here freely.
         The SVG is self-contained: no external files needed.
    ═══════════════════════════════════════════════════════════════════════ -->
    <div class="t-card-wrap" id="card-wrap">
      <svg id="streak-card"
        viewBox="0 0 495 195"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-label="GitHub Streak Stats for SAPTARSHI-coder"
      >
        <title>GitHub Streak Stats — SAPTARSHI-coder</title>

        <!-- Background & border -->
        <rect width="495" height="195" rx="12" ry="12"
              fill="#0d1117" stroke="#f97316" stroke-width="1.5"/>

        <!-- Title -->
        <text x="247" y="22" text-anchor="middle"
              font-family="Inter, sans-serif" font-size="12.5" font-weight="600"
              fill="#6e7681" letter-spacing="0.6">
          🔥 GitHub Streak Stats — SAPTARSHI-coder
        </text>

        <!-- Dividers -->
        <line x1="20"  y1="32" x2="475" y2="32" stroke="#21262d" stroke-width="1"/>
        <line x1="165" y1="38" x2="165" y2="181" stroke="#21262d" stroke-width="1"/>
        <line x1="330" y1="38" x2="330" y2="181" stroke="#21262d" stroke-width="1"/>

        <!-- ── Column 1: Total Contributions ──────────────────────────── -->
        <g>
          <text x="82" y="72" text-anchor="middle" font-size="24" fill="#22c55e">📊</text>
          <text x="82" y="90" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#6e7681" letter-spacing="1">
            TOTAL CONTRIBUTIONS
          </text>
          <text x="82" y="126" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#22c55e">
            1,247
          </text>
          <text x="82" y="145" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#6e7681">
            Last 365 days
          </text>
        </g>

        <!-- ── Column 2: Current Streak ───────────────────────────────── -->
        <g>
          <text x="248" y="72" text-anchor="middle" font-size="24" fill="#f97316">🔥</text>
          <text x="248" y="90" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#6e7681" letter-spacing="1">
            CURRENT STREAK
          </text>
          <text x="248" y="126" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#f97316">
            42 days
          </text>
          <text x="248" y="145" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#6e7681">
            May 1 – May 6, 2025
          </text>
        </g>

        <!-- ── Column 3: Longest Streak ───────────────────────────────── -->
        <g>
          <text x="413" y="72" text-anchor="middle" font-size="24" fill="#58a6ff">⚡</text>
          <text x="413" y="90" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#6e7681" letter-spacing="1">
            LONGEST STREAK
          </text>
          <text x="413" y="126" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#58a6ff">
            87 days
          </text>
          <text x="413" y="145" text-anchor="middle"
                font-family="Inter, sans-serif" font-size="9.5" fill="#6e7681">
            Feb 3 – Apr 30, 2025
          </text>
        </g>

        <!-- Footer timestamp -->
        <text x="247" y="183" text-anchor="middle"
              font-family="Inter, sans-serif" font-size="9" fill="#333d45">
          Updated automatically by GitHub Actions
        </text>
      </svg>
    </div>
    <!-- ════════════════════════════════════════════════════════════════════ -->

    <!-- Embed code -->
    <div class="t-embed">
      <div class="t-embed-header">
        <span class="t-embed-label">README Embed</span>
        <button class="t-copy-inline" id="btn-copy-embed">copy</button>
      </div>
      <pre class="t-embed-code" id="embed-code">![GitHub Streak](https://raw.githubusercontent.com/SAPTARSHI-coder/github-streak-tracker/main/streak.svg)</pre>
    </div>

  </div>

  <footer class="t-footer">Streak.Studio · Ember Template · Personal use only</footer>
  <div class="t-toast" id="toast">✓ Copied!</div>

  <script>
    const toast = document.getElementById('toast');
    function showToast(msg = '✓ Copied!') {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Copy raw SVG
    document.getElementById('btn-copy-svg').addEventListener('click', () => {
      const svg = document.getElementById('streak-card').outerHTML;
      navigator.clipboard.writeText(svg).then(() => showToast('✓ SVG copied!'));
    });

    // Copy markdown
    document.getElementById('btn-copy-md').addEventListener('click', () => {
      const md = document.getElementById('embed-code').textContent.trim();
      navigator.clipboard.writeText(md).then(() => showToast('✓ Markdown copied!'));
    });

    // Copy embed inline
    document.getElementById('btn-copy-embed').addEventListener('click', () => {
      const md = document.getElementById('embed-code').textContent.trim();
      navigator.clipboard.writeText(md).then(() => showToast('✓ Copied!'));
    });
  </script>

</body>
</html>
