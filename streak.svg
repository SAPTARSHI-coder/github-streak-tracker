<svg
  xmlns="http://www.w3.org/2000/svg"
  width="495"
  height="195"
  viewBox="0 0 495 195"
  role="img"
  aria-label="GitHub Streak Stats for SAPTARSHI-coder"
>
  <title>GitHub Streak Stats — SAPTARSHI-coder</title>

  <!-- ── Background ──────────────────────────────────────────────────── -->
  <rect width="495" height="195" rx="10" ry="10"
        fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- ── Top title bar ────────────────────────────────────────────────── -->
  <text x="247.5" y="22" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600"
        fill="#8b949e" letter-spacing="0.8">
    🔥 GitHub Streak Stats — SAPTARSHI-coder
  </text>

  <!-- ── Horizontal rule under title ──────────────────────────────────── -->
  <line x1="20" y1="32" x2="475" y2="32"
        stroke="#21262d" stroke-width="1"/>

  <!-- ── Vertical dividers between columns ───────────────────────────── -->
  <line x1="165" y1="38" x2="165" y2="181"
        stroke="#21262d" stroke-width="1"/>
  <line x1="330" y1="38" x2="330" y2="181"
        stroke="#21262d" stroke-width="1"/>

  <!-- ── Column 1: Total Contributions ───────────────────────────────── -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.1s" fill="freeze"/>
    
    <!-- icon -->
    <text x="82" y="52" text-anchor="middle" font-size="26" fill="#3fb950">📊</text>
    <!-- label -->
    <text x="82" y="78" text-anchor="middle"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.5">
      TOTAL CONTRIBUTIONS
    </text>
    <!-- value -->
    <text x="82" y="110" text-anchor="middle"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#3fb950">
      492
    </text>
    <text x="82" y="130" text-anchor="middle"
              font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#6e7681">
          Last 365 days
        </text>
  
  </g>

  <!-- ── Column 2: Current Streak ─────────────────────────────────────── -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.25s" fill="freeze"/>
    
    <!-- icon -->
    <text x="248" y="52" text-anchor="middle" font-size="26" fill="#f78166">🔥</text>
    <!-- label -->
    <text x="248" y="78" text-anchor="middle"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.5">
      CURRENT STREAK
    </text>
    <!-- value -->
    <text x="248" y="110" text-anchor="middle"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#f78166">
      4 days
    </text>
    <text x="248" y="130" text-anchor="middle"
              font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#6e7681">
          May 3, 2026 – May 6, 2026
        </text>
  
  </g>

  <!-- ── Column 3: Longest Streak ─────────────────────────────────────── -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.4s" fill="freeze"/>
    
    <!-- icon -->
    <text x="413" y="52" text-anchor="middle" font-size="26" fill="#58a6ff">⚡</text>
    <!-- label -->
    <text x="413" y="78" text-anchor="middle"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.5">
      LONGEST STREAK
    </text>
    <!-- value -->
    <text x="413" y="110" text-anchor="middle"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#58a6ff">
      15 days
    </text>
    <text x="413" y="130" text-anchor="middle"
              font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#6e7681">
          Apr 1, 2026 – Apr 15, 2026
        </text>
  
  </g>

  <!-- ── Footer ───────────────────────────────────────────────────────── -->
  <text x="247.5" y="189" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9.5" fill="#6e7681">
    Updated Wed, 06 May 2026 10:10:10 UTC
  </text>
</svg>